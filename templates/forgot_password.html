{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }
    .auth-box {
        width: 400px;
        padding: 3rem;
        text-align: center;
    }
    .auth-box form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        margin-top: 2rem;
    }
    .auth-box input {
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid var(--glass-border);
        background: rgba(0,0,0,0.2);
        color: white;
    }
    .auth-box a { color: var(--primary); text-decoration: none; }
    .flash { color: #f87171; margin-bottom: 1rem; }
</style>

<div class="auth-container">
    <div class="auth-box glass-panel">
        <div style="font-size: 3rem; margin-bottom: 1.5rem;">🔑</div>
        <h2 style="color: #fff; margin-bottom: 1rem; font-family: var(--font-heading);">Mot de passe oublié ?</h2>
        <p style="color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; font-size: 0.95rem;">
            Saisissez votre e-mail pour recevoir un lien de réinitialisation.
        </p>

        <form action="{{ url_for('forgot_password') }}" method="POST">
            <input type="email" name="email" placeholder="Votre adresse e-mail" required style="padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.25); color: white; transition: all 0.3s ease; outline: none; margin-bottom: 0.5rem;" onfocus="this.style.borderColor='var(--sunset-amber)'; this.style.boxShadow='0 0 10px rgba(245,158,11,0.25)';" onblur="this.style.borderColor='rgba(255,255,255,0.08)'; this.style.boxShadow='none';">
            <button type="submit" class="btn-sunset" style="padding: 1rem; border-radius: 12px; font-weight: 700; width: 100%;">Envoyer le lien ➔</button>
        </form>
        
        <p style="margin-top: 2rem;">
            <a href="{{ url_for('login') }}" style="display: inline-flex; align-items: center; justify-content: center; gap: 6px; color: var(--sunset-amber); text-decoration: none; font-weight: 500; transition: color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--sunset-amber)'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Retour à la connexion</a>
        </p>
    </div>
</div>
{% endblock %}
